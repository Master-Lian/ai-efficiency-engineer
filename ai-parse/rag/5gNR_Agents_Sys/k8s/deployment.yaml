apiVersion: apps/v1
kind: Deployment
metadata:
  name: 5g-nr-agent-system
  namespace: 5g-nr-agents
  labels:
    app: 5g-nr-agent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: 5g-nr-agent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: 5g-nr-agent
    spec:
      containers:
      - name: agent-system
        image: 5g-nr-agent-system:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: 5g-nr-config
        - secretRef:
            name: 5g-nr-secret
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
        - name: model-cache
          mountPath: /root/.cache
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: 5g-nr-data-pvc
      - name: model-cache
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - 5g-nr-agent
              topologyKey: kubernetes.io/hostname
