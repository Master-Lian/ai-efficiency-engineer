apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: 5g-nr-agent-ingress
  namespace: 5g-nr-agents
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - 5g-nr.your-domain.com
    secretName: 5g-nr-tls-secret
  rules:
  - host: 5g-nr.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: 5g-nr-agent-service
            port:
              number: 80
