apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: 5g-nr-agent-hpa
  namespace: 5g-nr-agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: 5g-nr-agent-system
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
